<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Password Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .generator-box {
            background: #1f1f1f;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
        }

        #password {
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            word-break: break-all;
        }

        .list-group-item {
            background: #2b2b2b;
            color: white;
            border: 1px solid #444;
        }

    </style>

</head>

<body>

<div class="generator-box">

    <h1 class="text-center mb-4">
        Password Generator
    </h1>

    <label class="form-label">
        Password Length
    </label>

    <input
        type="number"
        id="length"
        class="form-control mb-3"
        value="12"
        min="4"
        max="32"
    >

    <div class="form-check">

        <input
            type="checkbox"
            class="form-check-input"
            id="uppercase"
            checked
        >

        <label class="form-check-label">
            Uppercase Letters
        </label>

    </div>

    <div class="form-check">

        <input
            type="checkbox"
            class="form-check-input"
            id="numbers"
            checked
        >

        <label class="form-check-label">
            Numbers
        </label>

    </div>

    <div class="form-check mb-3">

        <input
            type="checkbox"
            class="form-check-input"
            id="symbols"
            checked
        >

        <label class="form-check-label">
            Special Symbols
        </label>

    </div>

    <button
        class="btn btn-primary w-100"
        onclick="generatePassword()"
    >
        Generate Password
    </button>

    <div id="password"
         class="text-center">
    </div>

    <div id="strength"
         class="text-center mt-2">
    </div>

    <button
        class="btn btn-success w-100 mt-3"
        onclick="copyPassword()"
    >
        Copy Password
    </button>

    <button
        class="btn btn-warning w-100 mt-3"
        onclick="savePassword()"
    >
        Save Password
    </button>

    <h3 class="text-center mt-4">
        Saved Passwords
    </h3>

    <ul
        id="savedPasswords"
        class="list-group mt-3"
    ></ul>

</div>

<script>

function generatePassword() {

    const length =
        document.getElementById('length').value;

    const uppercase =
        document.getElementById('uppercase').checked;

    const numbers =
        document.getElementById('numbers').checked;

    const symbols =
        document.getElementById('symbols').checked;

    let chars = 'abcdefghijklmnopqrstuvwxyz';

    if (uppercase) {
        chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    }

    if (numbers) {
        chars += '0123456789';
    }

    if (symbols) {
        chars += '!@#$%^&*()_+';
    }

    let password = '';

    for (let i = 0; i < length; i++) {

        const randomIndex =
            Math.floor(Math.random() * chars.length);

        password += chars[randomIndex];

    }

    document.getElementById('password').innerText =
        password;

    let strength = 'Weak';

    if (password.length >= 10) {
        strength = 'Medium';
    }

    if (
        password.length >= 14 &&
        uppercase &&
        numbers &&
        symbols
    ) {
        strength = 'Strong';
    }

    document.getElementById('strength').innerText =
        'Strength: ' + strength;

}

function copyPassword() {

    const password =
        document.getElementById('password').innerText;

    if (!password) {

        alert('Generate a password first!');
        return;

    }

    const tempInput =
        document.createElement('input');

    tempInput.value = password;

    document.body.appendChild(tempInput);

    tempInput.select();

    document.execCommand('copy');

    document.body.removeChild(tempInput);

    alert('Password copied!');

}

async function savePassword() {

    const password =
        document.getElementById('password').innerText;

    if (!password) {

        alert('Generate a password first!');
        return;

    }

    try {

        const response = await fetch('/save-password', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                password: password
            })

        });

        const message =
            await response.text();

        alert(message);

        addPasswordToList(password);

    } catch (error) {

        console.log(error);

        alert('Error saving password');

    }

}

function addPasswordToList(password) {

    const list =
        document.getElementById('savedPasswords');

    const item =
        document.createElement('li');

    item.className =
        'list-group-item';

    item.innerText = password;

    list.prepend(item);

}

</script>

</body>

</html>
